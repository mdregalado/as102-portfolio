<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Welcome</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700;900&family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body.starter-page-page {
      margin: 0;
      padding: 0;
      height: 100vh;

      background-image: url("assets/img/portfolio/startpage.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      color: white;
      font-family: "Ubuntu", sans-serif;
      overflow: hidden;
    }

    .welcome-text {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: 5px;

      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.8s ease-out forwards;

      text-shadow: 0 0 12px rgba(255, 255, 255, 0.7),
                   0 0 25px rgba(255, 255, 255, 0.5),
                   0 0 55px rgba(255, 255, 255, 0.4);
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .redirect-note {
      position: absolute;
      bottom: 30px;
      font-size: 20px;
      opacity: 0;
      animation: fade 2s ease-in forwards 1.5s;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <!-- Redirect after 5 seconds -->
  <script>
    setTimeout(() => {
      window.location.href = "index.html";
    }, 5000);  // changed to 5 seconds
  </script>

</head>

<body class="starter-page-page">

  <div class="welcome-text">
    WELCOME
  </div>

  <div class="redirect-note">
    Redirecting in 5 seconds...
  </div>

</body>

</html>
